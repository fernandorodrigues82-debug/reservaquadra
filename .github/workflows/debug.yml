name: Descobrir Seletores (debug)

# Este workflow NÃO é agendado. Você dispara manualmente pela aba "Actions"
# > "Descobrir Seletores (debug)" > "Run workflow", escolhendo o STEP.
# A saída (campos, botões e links da tela) aparece nos logs do job —
# copie e envie para ajustar os seletores em scraper/townsq_client.py.

on:
  workflow_dispatch:
    inputs:
      step:
        description: 'Etapa a inspecionar'
        required: true
        default: 'login'
        type: choice
        options:
          - login
          - senha
          - pos_login
          - reservas
          - amenities

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Rodar script de descoberta
        env:
          TOWNSQ_EMAIL: ${{ secrets.TOWNSQ_EMAIL }}
          TOWNSQ_SENHA: ${{ secrets.TOWNSQ_SENHA }}
          TOWNSQ_LOGIN_URL: ${{ secrets.TOWNSQ_LOGIN_URL }}
          STEP: ${{ github.event.inputs.step }}
        run: python scraper/debug_selectors.py

      - name: Salvar screenshot (se houver)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-debug
          path: screenshot_*.png
          if-no-files-found: ignore
          retention-days: 3
