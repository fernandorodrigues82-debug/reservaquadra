name: Descobrir Seletores (debug)

# Este workflow NÃO é agendado. Você dispara manualmente pela aba "Actions"
# > "Descobrir Seletores (debug)" > "Run workflow", escolhendo o STEP.
# A saída (campos, botões e links da tela) aparece nos logs do job —
# copie e envie para ajustar os seletores em scraper/townsq_client.py.

on:
  workflow_dispatch:
    inputs:
      step:
        description: 'Etapa a inspecionar'
        required: true
        default: 'login'
        type: choice
        options:
          - login
          - senha
          - pos_login
          - reservas
          - dependencias
          - quadra
          - calendario
          - horarios
          - confirmar
      dia_teste:
        description: 'Dia do mês a testar (apenas para step=horarios/confirmar)'
        required: false
        default: '25'
        type: string
      horario_teste:
        description: 'Horário a testar, ex: "12:00 - 13:00" (apenas para step=confirmar)'
        required: false
        default: '12:00 - 13:00'
        type: string

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Rodar script de descoberta
        env:
          TOWNSQ_EMAIL: ${{ secrets.TOWNSQ_EMAIL }}
          TOWNSQ_SENHA: ${{ secrets.TOWNSQ_SENHA }}
          TOWNSQ_LOGIN_URL: ${{ secrets.TOWNSQ_LOGIN_URL }}
          STEP: ${{ github.event.inputs.step }}
          DIA_TESTE: ${{ github.event.inputs.dia_teste }}
          HORARIO_TESTE: ${{ github.event.inputs.horario_teste }}
        run: python scraper/debug_selectors.py

      - name: Salvar screenshots direto no repositório (se houver)
        if: always()
        run: |
          if ls screenshot_*.png >/dev/null 2>&1; then
            mkdir -p debug_screenshots
            mv screenshot_*.png debug_screenshots/
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add debug_screenshots/
            git commit -m "Screenshots de debug (run ${{ github.run_id }})" || echo "nada para commitar"
            git push
          else
            echo "Nenhum screenshot gerado nesta execução."
          fi
